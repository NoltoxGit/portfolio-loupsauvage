name: Semgrep security scan

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: semgrep-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Run Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run Semgrep security scan
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            -w /src \
            semgrep/semgrep:1.167.0 \
            semgrep scan \
            --config auto \
            --sarif \
            --output semgrep-results.raw.sarif

      - name: Filter ignored Semgrep findings for GitHub code scanning
        run: |
          jq '
            def ignored_by_semgrep:
              ((.suppressions // []) | length) > 0
              or (.properties.ignored == true)
              or (.properties.is_ignored == true)
              or (.properties._extra.ignored == true)
              or (.properties._extra.is_ignored == true);

            .runs |= map(
              .results = ((.results // []) | map(select(ignored_by_semgrep | not)))
            )
          ' semgrep-results.raw.sarif > semgrep-results.sarif

      - name: Upload Semgrep SARIF to GitHub code scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-results
          path: |
            semgrep-results.raw.sarif
            semgrep-results.sarif
          if-no-files-found: ignore
