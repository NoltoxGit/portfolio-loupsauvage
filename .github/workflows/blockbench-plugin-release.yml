name: Blockbench plugin release

on:
  push:
    branches:
    - main
    paths:
    - "blockbench-plugin/**"
    - ".github/workflows/blockbench-plugin-release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blockbench-plugin-release
  cancel-in-progress: true

jobs:
  release:
    name: Package Blockbench plugin
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Read project version
      id: version
      run: |
        VERSION="$(node tools/sync-project-version.mjs --check --print)"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=blockbench-plugin-v$VERSION" >> "$GITHUB_OUTPUT"

    - name: Check plugin syntax
      run: node --check blockbench-plugin/loupsauvage_uploader.js

    - name: Check for accidental Blockbench tokens
      run: |
        if grep -R -E 'lsbb_[A-Za-z0-9]{16,}' blockbench-plugin; then
          echo "A token-like value was found in blockbench-plugin."
          exit 1
        fi

    - name: Package plugin
      run: |
        rm -rf .plugin-dist .plugin-package
        mkdir -p .plugin-dist .plugin-package
        cp blockbench-plugin/loupsauvage_uploader.js .plugin-package/loupsauvage_uploader.js
        cp blockbench-plugin/README.md .plugin-package/README.md
        if [ -d blockbench-plugin/assets ]; then
          cp -R blockbench-plugin/assets .plugin-package/assets
        fi
        cp .plugin-package/loupsauvage_uploader.js .plugin-dist/loupsauvage_uploader.js
        cd .plugin-package
        zip -r ../.plugin-dist/loupsauvage-uploader-blockbench-plugin.zip . \
          -x 'node_modules/*' 'dist/*' '*.log' '*.env*'
        cd ..
        sha256sum .plugin-dist/loupsauvage_uploader.js .plugin-dist/loupsauvage-uploader-blockbench-plugin.zip \
          > .plugin-dist/SHA256SUMS.txt

    - name: Upload plugin artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: loupsauvage-uploader-blockbench-plugin
        path: |
          .plugin-dist/loupsauvage_uploader.js
          .plugin-dist/loupsauvage-uploader-blockbench-plugin.zip
          .plugin-dist/SHA256SUMS.txt
        if-no-files-found: error

    - name: Check existing release
      id: release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
          echo "release_exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "release_exists=false" >> "$GITHUB_OUTPUT"
        fi

        if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
          echo "tag_exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag_exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub release
      if: github.ref == 'refs/heads/main' && steps.release.outputs.release_exists == 'false'
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ steps.version.outputs.tag }}" \
          .plugin-dist/loupsauvage_uploader.js \
          .plugin-dist/loupsauvage-uploader-blockbench-plugin.zip \
          .plugin-dist/SHA256SUMS.txt \
          --target "$GITHUB_SHA" \
          --title "LoupSauvage Blockbench Plugin ${{ steps.version.outputs.version }}" \
          --notes "Release automatique du plugin Blockbench LoupSauvage."

    - name: Skip unchanged release
      if: github.ref == 'refs/heads/main' && steps.release.outputs.release_exists == 'true'
      run: echo "Release ${{ steps.version.outputs.tag }} already exists. Artifact only."

    - name: Skip release outside main
      if: github.ref != 'refs/heads/main'
      run: echo "Release skipped because this workflow is running on ${{ github.ref }}."
